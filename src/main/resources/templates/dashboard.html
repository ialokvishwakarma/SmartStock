<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartStock | Dashboard</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        body {
          font-family: 'Segoe UI', sans-serif;
          background: url('/images/bg.png') no-repeat center center fixed;
          background-size: cover;
          margin: 0;
          padding: 0;
        }

        header {
          background-color: #4CAF50;
          color: white;
          padding: 15px 30px;
          display: flex;
          align-items: center;
          justify-content: space-between;
        }

        header img {
          height: 40px;
          margin-right: 10px;
        }

        .logo {
          display: flex;
          align-items: center;
          font-size: 22px;
          font-weight: bold;
        }

        .logout-btn {
          background-color: white;
          color: #4CAF50;
          padding: 8px 14px;
          border-radius: 6px;
          text-decoration: none;
          font-weight: bold;
        }
        .logout-btn, .hire-btn {
  outline: none;
  border: none;
}

.logout-btn:focus, .hire-btn:focus {
  outline: none;
  box-shadow: none;
}


        .hire-btn {

          background-color: white;
          color: #4CAF50;
          padding: 8px 14px;
          border-radius: 6px;
          text-decoration: none;
          font-weight: bold;
        }


        .logout-btn:hover {
          background-color: #f0f0f0;
        }
        .hire-btn:hover {
            background-color: #f0f0f0;
            }

        .content {
          padding: 30px;
          background-color: rgba(255, 255, 255, 0.9);
          margin: 40px auto;
          width: 85%;
          border-radius: 10px;
          box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        h2 {
          color: #2e7d32;
          margin-bottom: 20px;
        }

        .add-btn {
          background-color: #4CAF50;
          color: white;
          border: none;
          padding: 10px 16px;
          border-radius: 6px;
          cursor: pointer;
          margin-bottom: 15px;
        }

        .add-btn:hover {
          background-color: #45a049;
        }

        table {
          width: 100%;
          border-collapse: collapse;
          margin-top: 10px;
        }

        th, td {
          border: 1px solid #ddd;
          padding: 12px;
          text-align: center;
        }

        th {
          background-color: #4CAF50;
          color: white;
        }

        tr:nth-child(even) {
          background-color: #f9f9f9;
        }

        .action-btn {
          padding: 6px 10px;
          border: none;
          border-radius: 4px;
          color: white;
          cursor: pointer;
        }

        .edit {
          background-color: #2196F3;
        }

        .delete {
          background-color: #f44336;
        }

        .view {
          background-color: #009688;
        }

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px; /* This controls the exact spacing between buttons */
}
        .msg {
          text-align: center;
          font-weight: bold;
          color: #2e7d32;
          margin-top: 10px;
        }

    </style>
</head>
<body>

<header>
    <div class="logo">
        <img th:src="@{/images/logo.png}" alt="SmartStock">
        Owner Dashboard
    </div>

    <div class="header-actions">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">
                Logout
            </button>
        </form>

        <a th:href="@{/staff/add}" style="text-decoration: none;">
            <button type="button" class="hire-btn">
                Assign Staff
            </button>
        </a>
    </div>

</header>

<div class="content">
    <h2>Warehouses Overview</h2>

    <div class="msg" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="msg" style="color:red;" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <a th:href="@{/warehouse/add}">
        <button class="add-btn">Add New Warehouse</button>
    </a>

    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Warehouse Name</th>
            <th>Location</th>
            <th>Type</th>
            <th>Capacity</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="w, iStat : ${warehouses}">
            <td th:text="${iStat.index + 1}"></td>
            <td th:text="${w.name}"></td>
            <td th:text="${w.location}"></td>
            <td th:text="${w.type}"></td>
            <td th:text="${w.capacity}"></td>
            <td>
                <a th:href="@{'/products/' + ${w.id}}"><button class="action-btn view">View</button></a>

                <a th:href="@{'/warehouse/delete/' + ${w.id}}"><button class="action-btn delete">Delete</button></a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
