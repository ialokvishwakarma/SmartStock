<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartStock | Dashboard</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #1b5e20;
            --primary-mid: #2e7d32;
            --primary-light: #43a047;
            --primary-bright: #4CAF50;
            --primary-pale: #e8f5e9;
            --surface: #ffffff;
            --surface-bg: #f4f6f4;
            --border: #e0e6e0;
            --text-primary: #1a2e1a;
            --text-secondary: #4a5568;
            --text-muted: #9cad9c;
            --danger: #c62828;
            --info: #1565c0;
            --teal: #00695c;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: url('/images/bg.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 100%);
            color: white;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(27,94,32,0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header img {
            height: 34px;
            margin-right: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-family: 'DM Serif Display', serif;
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.3px;
            gap: 2px;
        }

        .logo-sub {
            font-size: 0.75rem;
            font-family: 'DM Sans', sans-serif;
            opacity: 0.75;
            font-weight: 300;
            margin-left: 8px;
            padding-left: 8px;
            border-left: 1px solid rgba(255,255,255,0.35);
            padding-top: 1px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            padding: 7px 18px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.87rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.25);
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .hire-btn {
            background: white;
            color: var(--primary-mid);
            padding: 7px 18px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.87rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .hire-btn:hover {
            background: var(--primary-pale);
            transform: translateY(-1px);
        }

        /* CONTENT */
        .content {
            padding: 36px;
            background: rgba(255,255,255,0.95);
            margin: 36px auto;
            width: 88%;
            max-width: 1100px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-title h2 {
            font-family: 'DM Serif Display', serif;
            color: var(--text-primary);
            font-size: 1.7rem;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .page-title p {
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .add-btn {
            background: linear-gradient(135deg, var(--primary-mid), var(--primary-light));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 3px 10px rgba(46,125,50,0.3);
            text-decoration: none;
            display: inline-block;
        }

        .add-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 16px rgba(46,125,50,0.4);
        }

        /* ALERTS */
        .alert {
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert-success {
            background: #e8f5e9;
            color: var(--primary);
            border: 1px solid #c8e6c9;
        }

        .alert-error {
            background: #ffebee;
            color: var(--danger);
            border: 1px solid #ffcdd2;
        }

        /* TABLE */
        .table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: var(--primary);
            color: white;
            padding: 13px 16px;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        table th:first-child { border-radius: 0; }

        table td {
            padding: 13px 16px;
            font-size: 0.9rem;
            color: var(--text-primary);
            border-bottom: 1px solid #f0f4f0;
        }

        table tr:last-child td { border-bottom: none; }

        table tr:hover td {
            background: #f7fbf7;
        }

        .serial {
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        /* ACTION BUTTONS */
        .action-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
            margin: 0 2px;
        }

        .view { background: var(--teal); }
        .view:hover { background: #004d40; }

        .delete { background: var(--danger); }
        .delete:hover { background: #b71c1c; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-type {
            background: var(--primary-pale);
            color: var(--primary-mid);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img th:src="@{/images/logo.png}" alt="SmartStock">
        SmartStock
        <span class="logo-sub">Owner Dashboard</span>
    </div>

    <div class="header-actions">
        <a th:href="@{/staff/add}" style="text-decoration: none;">
            <button type="button" class="hire-btn">
                ＋ Assign Staff
            </button>
        </a>
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</header>

<div class="content">
    <div class="page-header">
        <div class="page-title">
            <h2>Warehouses Overview</h2>
            <p>Manage all your warehouses and their inventory</p>
        </div>
        <a th:href="@{/warehouse/add}" class="add-btn">＋ Add New Warehouse</a>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Warehouse Name</th>
                <th>Location</th>
                <th>Type</th>
                <th>Capacity</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="w, iStat : ${warehouses}">
                <td class="serial" th:text="${iStat.index + 1}"></td>
                <td style="font-weight:600;" th:text="${w.name}"></td>
                <td th:text="${w.location}"></td>
                <td><span class="badge badge-type" th:text="${w.type}"></span></td>
                <td th:text="${w.capacity}"></td>
                <td>
                    <a th:href="@{'/products/' + ${w.id}}" class="action-btn view">View</a>
                    <a th:href="@{'/warehouse/delete/' + ${w.id}}" class="action-btn delete" onclick="return confirm('Delete this warehouse?')">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
