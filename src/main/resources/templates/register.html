<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartStock | Register</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #1b5e20;
            --primary-mid: #2e7d32;
            --primary-light: #43a047;
            --primary-bright: #4CAF50;
            --primary-pale: #e8f5e9;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text-primary: #1a2e1a;
            --text-secondary: #4a5568;
            --shadow-lg: 0 10px 40px rgba(27,94,32,0.13), 0 2px 8px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: url('/images/bg.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            min-height: 100vh;
        }

        .overlay {
            background: linear-gradient(135deg, rgba(27,94,32,0.82) 0%, rgba(0,0,0,0.55) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            padding: 48px 44px 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-bright), var(--primary-light), #00bfa5);
        }

        .card img {
            height: 64px;
            margin-bottom: 8px;
        }

        .brand-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .brand-tagline {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-weight: 300;
        }

        h2 {
            font-family: 'DM Serif Display', serif;
            color: var(--text-primary);
            font-size: 1.6rem;
            margin-bottom: 28px;
            font-weight: 400;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 7px;
        }

        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            background: #fafafa;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-bright);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
        }

        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary-mid), var(--primary-light));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 0.3px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(46,125,50,0.35);
        }

        button[type="submit"]:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(46,125,50,0.45);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .footer-link {
            font-size: 0.87rem;
            color: var(--text-secondary);
        }

        .footer-link a {
            color: var(--primary-mid);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="overlay">
    <div class="card">
        <img src="/images/logo.png" alt="SmartStock">
        <div class="brand-name">SmartStock</div>
        <div class="brand-tagline">Create your business account</div>

        <h2>Get started</h2>

        <form method="post" th:action="@{/register}">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required>
            </div>
            <button type="submit">Create Account</button>
        </form>

        <div class="divider"></div>
        <p class="footer-link">Already registered? <a href="/login">Sign in</a></p>
    </div>
</div>
</body>
</html>
