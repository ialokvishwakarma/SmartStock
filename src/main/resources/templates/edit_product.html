<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Product | SmartStock</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        body {
          font-family: 'Segoe UI', sans-serif;
          background: url('/images/bg.png') no-repeat center center fixed;
          background-size: cover;
          margin: 0;
          padding: 0;
        }

        .container {
          width: 40%;
          margin: 70px auto;
          background: rgba(255, 255, 255, 0.93);
          padding: 30px;
          border-radius: 12px;
          box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
        }

        h2 {
          text-align: center;
          color: #2e7d32;
          margin-bottom: 25px;
        }

        form {
          display: flex;
          flex-direction: column;
        }

        label {
          font-weight: 600;
          margin: 8px 0 5px;
        }

        input, select {
          padding: 10px;
          border: 1px solid #ccc;
          border-radius: 6px;
          outline: none;
        }

        button {
          margin-top: 20px;
          background-color: #4CAF50;
          color: white;
          padding: 12px;
          border: none;
          border-radius: 6px;
          font-size: 16px;
          cursor: pointer;
        }

        button:hover {
          background-color: #43a047;
        }

        .back-link {
          display: block;
          text-align: center;
          margin-top: 20px;
          color: #2e7d32;
          text-decoration: none;
        }

        .back-link:hover {
          text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Edit Product</h2>
    <form th:action="@{/product/update/{id}(id=${product.id})}" method="post" th:object="${product}">
        <label>SKU:</label>
        <input type="text" th:field="*{sku}" readonly>

        <label>Name:</label>
        <input type="text" th:field="*{name}" required>

        <label>Category:</label>
        <input type="text" th:field="*{category}">

        <label>Price (₹):</label>
        <input type="number" step="0.01" th:field="*{price}">

        <label>Quantity:</label>
        <input type="number" th:field="*{quantity}">

        <button type="submit">Update Product</button>
    </form>
    <a th:href="@{/products/{id}(id=${product.warehouse.id})}" class="back-link">Back to Products</a>
</div>
</body>
</html>
