<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartStock | Admin Dashboard</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: url('/images/bg.png') no-repeat center center fixed; background-size: cover; margin: 0; padding: 0; }
        header { background-color: #4CAF50; color: white; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
        header img { height: 40px; margin-right: 10px; }
        .logo { display: flex; align-items: center; font-size: 22px; font-weight: bold; }
        .logout-btn { background-color: white; color: #4CAF50; padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .logout-btn:hover { background-color: #f0f0f0; }
        .content { padding: 30px; background-color: rgba(255, 255, 255, 0.9); margin: 40px auto; width: 85%; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        h2 { color: #2e7d32; margin-bottom: 20px; }
        h3 { color: #2e7d32; margin-top: 30px; border-bottom: 2px solid #4CAF50; padding-bottom: 5px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .header-actions { display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="/images/logo.png" alt="SmartStock">
        Admin
    </div>
    <div class="header-actions">
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</header>

<div class="content">
    <h2>Welcome, <span th:text="${userName}">Admin</span></h2>
    <p>Master Control Panel: View all registered users and active warehouses below.</p>

    <h3>Registered Business Owners</h3>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Owner Name</th>
            <th>Email Address</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="owner : ${allOwners}">
            <td th:text="${owner.id}"></td>
            <td th:text="${owner.name}"></td>
            <td th:text="${owner.email}"></td>
        </tr>
        </tbody>
    </table>

    <h3>Global Managed Warehouses</h3>
    <table>
        <thead>
        <tr>
            <th>Warehouse Name</th>
            <th>Location</th>
            <th>Type</th>
            <th>Capacity</th>
            <th>Owned By</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="w : ${allWarehouses}">
            <td th:text="${w.name}"></td>
            <td th:text="${w.location}"></td>
            <td th:text="${w.type}"></td>
            <td th:text="${w.capacity}"></td>
            <td th:text="${w.owner.name}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
