<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartStock | Admin Dashboard</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: url('/images/bg.png') no-repeat center center fixed; background-size: cover; margin: 0; padding: 0; }
        header { background-color: #333; color: white; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
        header img { height: 40px; margin-right: 10px; }
        .logo { display: flex; align-items: center; font-size: 22px; font-weight: bold; }
        .logout-btn { background-color: white; color: #333; padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .logout-btn:hover { background-color: #f0f0f0; }
        .content { padding: 30px; background-color: rgba(255, 255, 255, 0.95); margin: 40px auto; width: 85%; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        h2 { color: #333; margin-bottom: 20px; }
        .system-status { background-color: #e3f2fd; padding: 20px; border-left: 5px solid #2196F3; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="/images/logo.png" alt="SmartStock">
        SmartStock System Admin
    </div>
    <form th:action="@{/logout}" method="post" style="display: inline;">
        <button type="submit" class="logout-btn">Logout</button>
    </form>
</header>

<div class="content">
    <h2>Welcome, <span th:text="${userName}">Admin</span></h2>
    <p>This is the master control panel for the SmartStock platform.</p>

    <div class="system-status">
        <h3>System Status: Online</h3>
        <p>The Global User Management interface will be deployed here in a future update.</p>
    </div>
</div>

</body>
</html>
