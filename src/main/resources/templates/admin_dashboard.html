<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartStock | Admin Dashboard</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #1b5e20;
            --primary-mid: #2e7d32;
            --primary-light: #43a047;
            --primary-bright: #4CAF50;
            --primary-pale: #e8f5e9;
            --surface: #ffffff;
            --border: #e0e6e0;
            --text-primary: #1a2e1a;
            --text-secondary: #4a5568;
            --text-muted: #9cad9c;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: url('/images/bg.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #0d2b0f 0%, var(--primary) 100%);
            color: white;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0,0,0,0.35);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header img {
            height: 34px;
            margin-right: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-family: 'DM Serif Display', serif;
            font-size: 1.2rem;
        }

        .logo-badge {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: #a5d6a7;
            font-size: 0.7rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 10px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.12);
            color: white;
            padding: 7px 18px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.87rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.22);
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .logout-btn:hover { background: rgba(255,255,255,0.22); }

        .content {
            padding: 36px;
            background: rgba(255,255,255,0.95);
            margin: 36px auto;
            width: 88%;
            max-width: 1100px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
        }

        .welcome-banner {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border-radius: 14px;
            padding: 24px 28px;
            margin-bottom: 36px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .welcome-icon {
            font-size: 2.4rem;
        }

        .welcome-text h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .welcome-text p {
            font-size: 0.88rem;
            opacity: 0.82;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            margin-top: 32px;
        }

        .section-header:first-of-type { margin-top: 0; }

        .section-header h3 {
            font-family: 'DM Serif Display', serif;
            color: var(--text-primary);
            font-size: 1.15rem;
            font-weight: 400;
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        table td {
            padding: 12px 16px;
            font-size: 0.9rem;
            color: var(--text-primary);
            border-bottom: 1px solid #f0f4f0;
        }

        table tr:last-child td { border-bottom: none; }

        table tr:hover td { background: #f7fbf7; }

        .id-cell {
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .email-cell {
            color: var(--text-secondary);
            font-size: 0.87rem;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-type {
            background: var(--primary-pale);
            color: var(--primary-mid);
        }

        .owner-badge {
            background: #e3f2fd;
            color: #1565c0;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="/images/logo.png" alt="SmartStock">
        SmartStock
        <span class="logo-badge">Admin</span>
    </div>
    <div class="header-actions">
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</header>

<div class="content">
    <div class="welcome-banner">
        <div class="welcome-icon">🛡️</div>
        <div class="welcome-text">
            <h2>Welcome, <span th:text="${userName}">Admin</span></h2>
            <p>Master Control Panel — View all registered users and active warehouses below.</p>
        </div>
    </div>

    <div class="section-header">
        <h3>Registered Business Owners</h3>
        <div class="section-line"></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Owner Name</th>
                <th>Email Address</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="owner : ${allOwners}">
                <td class="id-cell" th:text="${owner.id}"></td>
                <td style="font-weight:600;" th:text="${owner.name}"></td>
                <td class="email-cell" th:text="${owner.email}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="section-header">
        <h3>Global Managed Warehouses</h3>
        <div class="section-line"></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Warehouse Name</th>
                <th>Location</th>
                <th>Type</th>
                <th>Capacity</th>
                <th>Owned By</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="w : ${allWarehouses}">
                <td style="font-weight:600;" th:text="${w.name}"></td>
                <td th:text="${w.location}"></td>
                <td><span class="badge badge-type" th:text="${w.type}"></span></td>
                <td th:text="${w.capacity}"></td>
                <td><span class="owner-badge" th:text="${w.owner.name}"></span></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
