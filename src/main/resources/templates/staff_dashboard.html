<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartStock | Staff Dashboard</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: url('/images/bg.png') no-repeat center center fixed; background-size: cover; margin: 0; padding: 0; }
        header { background-color: #FF9800; color: white; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
        header img { height: 40px; margin-right: 10px; }
        .logo { display: flex; align-items: center; font-size: 22px; font-weight: bold; }
        .logout-btn { background-color: white; color: #FF9800; padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .logout-btn:hover { background-color: #f0f0f0; }
        .content { padding: 30px; background-color: rgba(255, 255, 255, 0.95); margin: 40px auto; width: 85%; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        h2 { color: #E65100; margin-bottom: 20px; }
        .add-btn { background-color: #FF9800; color: white; border: none; padding: 15px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; }
        .add-btn:hover { background-color: #F57C00; }
        .error-panel { background-color: #ffebee; padding: 20px; border-left: 5px solid #f44336; border-radius: 4px; margin-top: 20px; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="/images/logo.png" alt="SmartStock">
        SmartStock Staff Panel
    </div>
    <form th:action="@{/logout}" method="post" style="display: inline;">
        <button type="submit" class="logout-btn">Logout</button>
    </form>
</header>

<div class="content">
    <h2>Welcome, <span th:text="${userName}">Staff Member</span></h2>
    <p>Manage your assigned warehouse inventory and record daily stock movements.</p>

    <div th:if="${warehouseId != null}">
        <a th:href="@{'/products/' + ${warehouseId}}">
            <button class="add-btn">Open Warehouse Inventory</button>
        </a>
    </div>

    <div th:if="${warehouseId == null}" class="error-panel">
        You have not been assigned to a warehouse yet. Please contact your Owner/Administrator to update your account configuration.
    </div>
</div>

</body>
</html>
