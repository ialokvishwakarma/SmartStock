<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartStock | Hire Munshi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #1b5e20;
            --primary-mid: #2e7d32;
            --primary-light: #43a047;
            --primary-bright: #4CAF50;
            --primary-pale: #e8f5e9;
            --border: #e0e6e0;
            --text-primary: #1a2e1a;
            --text-secondary: #4a5568;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8f1 100%);
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-container {
            width: 100%;
            max-width: 460px;
            background: white;
            padding: 42px 44px 36px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(27,94,32,0.12), 0 2px 8px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-bright), #00bfa5);
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header .icon { font-size: 2rem; margin-bottom: 10px; display: block; }

        h2 {
            font-family: 'DM Serif Display', serif;
            color: var(--text-primary);
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .form-subtitle { font-size: 0.83rem; color: var(--text-secondary); }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 7px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.93rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            background: #fafafa;
            transition: all 0.2s ease;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--primary-bright);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
        }

        .select-wrap { position: relative; }
        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary-mid), var(--primary-light));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(46,125,50,0.35);
        }

        .btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(46,125,50,0.45);
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <span class="icon">👤</span>
        <h2>Assign New Staff</h2>
        <p class="form-subtitle">Add a staff member to manage warehouse inventory</p>
    </div>

    <form th:action="@{/staff/add}" method="post" th:object="${staffDto}">
        <div class="form-group">
            <label>Staff Name</label>
            <input type="text" th:field="*{name}" placeholder="Full name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" th:field="*{email}" placeholder="staff@example.com" required>
        </div>

        <div class="form-group">
            <label>Login Password</label>
            <input type="password" th:field="*{password}" placeholder="Set a secure password" required>
        </div>

        <div class="form-group">
            <label>Assign to Warehouse</label>
            <div class="select-wrap">
                <select name="warehouseId" required>
                    <option th:each="w : ${warehouses}" th:value="${w.id}" th:text="${w.name}"></option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn">Register Staff Member</button>
    </form>
</div>

</body>
</html>
