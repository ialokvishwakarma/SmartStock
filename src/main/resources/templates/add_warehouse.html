<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Warehouse | SmartStock 🌿</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        body {
          font-family: 'Segoe UI', sans-serif;
          background: url('/images/bg.png') no-repeat center center fixed;
          background-size: cover;
          margin: 0;
          padding: 0;
        }

        .container {
          width: 450px;
          margin: 70px auto;
          padding: 25px 35px;
          background-color: rgba(255, 255, 255, 0.92);
          border-radius: 12px;
          box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        h2 {
          text-align: center;
          color: #2e7d32;
          margin-bottom: 25px;
        }

        label {
          display: block;
          font-weight: bold;
          color: #333;
          margin-bottom: 5px;
        }

        input, select {
          width: 100%;
          padding: 10px;
          border: 1px solid #ccc;
          border-radius: 6px;
          margin-bottom: 18px;
          box-sizing: border-box;
        }

        button {
          background-color: #4CAF50;
          color: white;
          padding: 10px 18px;
          border: none;
          border-radius: 6px;
          cursor: pointer;
          width: 100%;
          font-size: 16px;
        }

        button:hover {
          background-color: #45a049;
        }

        .back-link {
          display: block;
          text-align: center;
          margin-top: 15px;
          text-decoration: none;
          color: #2e7d32;
          font-weight: bold;
        }

        .back-link:hover {
          text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Add New Warehouse</h2>

    <form th:action="@{/warehouse/add}" method="post" th:object="${warehouse}">
        <label for="name">Warehouse Name</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Enter warehouse name" required>

        <label for="location">Location</label>
        <input type="text" id="location" th:field="*{location}" placeholder="Enter location" required>

        <label for="type">Type</label>
        <select id="type" th:field="*{type}" required>
            <option value="" disabled selected>-- Select Type --</option>
            <option value="Cold Storage">Cold Storage</option>
            <option value="Dry Storage">Dry Storage</option>
            <option value="Liquid Storage">Liquid Storage</option>
        </select>
        <label for="capacity">Capacity (in tons)</label>
        <input type="number" id="capacity" th:field="*{capacity}" placeholder="Enter capacity" required>

        <button type="submit">Save Warehouse</button>
    </form>

    <a href="/dashboard" class="back-link">Back to Dashboard</a>
</div>
</body>
</html>
