<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add Product | SmartStock</title>
  <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: url('/images/bg.png') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 40%;
      margin: 70px auto;
      background: rgba(255, 255, 255, 0.93);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
    }

    h2 {
      text-align: center;
      color: #2e7d32;
      margin-bottom: 25px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      margin: 8px 0 5px;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }

    button {
      margin-top: 20px;
      background-color: #4CAF50;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #43a047;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #2e7d32;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>Add New Product</h2>
  <form th:action="@{/product/add/{id}(id=${warehouseId})}" method="post" th:object="${product}">
    <label>SKU:</label>
    <input type="text" th:field="*{sku}" required placeholder="Enter unique SKU">

    <label>Name:</label>
    <input type="text" th:field="*{name}" required placeholder="Enter product name">

    <label for="category">Category:</label>
    <select id="category" th:field="*{category}" required>
      <option value="">-- Select Category --</option>
      <option value="Electronics">Electronics</option>
      <option value="Clothing">Clothing & Apparel</option>
      <option value="Food">Food & Beverages</option>
      <option value="Books">Books & Media</option>
      <option value="Home">Home & Garden</option>
      <option value="Sports">Sports & Outdoors</option>
      <option value="Health">Health & Beauty</option>
      <option value="Toys">Toys & Games</option>
      <option value="Automotive">Automotive</option>
      <option value="Office">Office Supplies</option>
      <option value="Other">Other</option>
    </select>

    <label for="price">Price (₹):</label>
    <div class="input-group">
      <span class="currency-symbol">₹</span>
      <input type="number" id="price" th:field="*{price}"
             step="0.01" min="0" max="999999.99"
             placeholder="0.00" required>
    </div>
    <small class="help-text">Enter price per unit</small>

    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" th:field="*{quantity}"
           min="0" max="999999" step="1"
           placeholder="0" required>
    <small class="help-text">Number of units in stock</small>

    <button type="submit">Save Product</button>
  </form>
  <a th:href="@{/products/{id}(id=${warehouseId})}" class="back-link">Back to Products</a>
</div>
</body>
</html>
