<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Products | SmartStock</title>
  <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --primary: #1b5e20;
        --primary-mid: #2e7d32;
        --primary-light: #43a047;
        --primary-bright: #4CAF50;
        --primary-pale: #e8f5e9;
        --border: #e0e6e0;
        --text-primary: #1a2e1a;
        --text-secondary: #4a5568;
        --text-muted: #9cad9c;
        --danger: #c62828;
        --info: #1565c0;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: url('/images/bg.png') no-repeat center center fixed;
        background-size: cover;
        margin: 0; padding: 0;
        min-height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 1100px;
        margin: 40px auto;
        background: rgba(255,255,255,0.95);
        padding: 36px;
        border-radius: 18px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }

    /* Page title */
    .page-top {
        margin-bottom: 24px;
    }

    h2 {
        font-family: 'DM Serif Display', serif;
        color: var(--text-primary);
        font-size: 1.7rem;
        font-weight: 400;
        margin-bottom: 6px;
    }

    .warehouse-info {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        background: var(--primary-pale);
        border: 1px solid #c8e6c9;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 0.87rem;
        color: var(--primary-mid);
        font-weight: 500;
        margin-bottom: 24px;
    }

    .warehouse-info span { color: var(--text-secondary); font-weight: 400; }

    /* Top bar */
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .action-link {
        text-decoration: none;
        padding: 9px 18px;
        border-radius: 10px;
        font-size: 0.88rem;
        font-weight: 600;
        transition: all 0.2s ease;
        display: inline-block;
    }

    .action-link-primary {
        background: linear-gradient(135deg, var(--primary-mid), var(--primary-light));
        color: white;
        box-shadow: 0 3px 10px rgba(46,125,50,0.3);
    }

    .action-link-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 16px rgba(46,125,50,0.4);
    }

    .action-link-ghost {
        background: transparent;
        color: var(--primary-mid);
        border: 1.5px solid var(--primary-light);
    }

    .action-link-ghost:hover {
        background: var(--primary-pale);
    }

    /* Table */
    .table-wrap {
        overflow-x: auto;
        border-radius: 12px;
        border: 1px solid var(--border);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    table th {
        background: var(--primary);
        color: white;
        padding: 13px 16px;
        text-align: left;
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
    }

    table td {
        padding: 13px 16px;
        font-size: 0.9rem;
        color: var(--text-primary);
        border-bottom: 1px solid #f0f4f0;
    }

    table tr:last-child td { border-bottom: none; }
    table tr:hover td { background: #f7fbf7; }

    .sku-cell {
        font-size: 0.82rem;
        color: var(--text-muted);
        font-weight: 500;
        font-family: 'Courier New', monospace;
    }

    .price-cell {
        font-weight: 600;
        color: var(--primary-mid);
    }

    .qty-cell {
        font-weight: 600;
    }

    .qty-low { color: #e65100; }
    .qty-ok { color: var(--primary-mid); }

    .badge-cat {
        background: #e3f2fd;
        color: #1565c0;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 600;
    }

    .action-btn {
        padding: 6px 13px;
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.82rem;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        transition: all 0.2s;
        margin: 0 2px;
    }

    .edit-btn { background: var(--info); }
    .edit-btn:hover { background: #0d47a1; }

    .delete-btn { background: var(--danger); }
    .delete-btn:hover { background: #b71c1c; }
  </style>
</head>
<body>
<div class="container">
    <div class="page-top">
        <h2>Products in Warehouse</h2>
    </div>

    <div class="warehouse-info">
        📦 <strong th:text="${warehouse.name}"></strong>
        <span>|</span>
        📍 <span th:text="${warehouse.location}"></span>
    </div>

    <div class="top-bar">
        <a th:href="@{/product/add/{id}(id=${warehouse.id})}" class="action-link action-link-primary">＋ Add Product</a>
        <a href="/dashboard" class="action-link action-link-ghost">← Back to Dashboard</a>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>SKU</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Price (₹)</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td class="sku-cell" th:text="${product.sku}"></td>
                <td style="font-weight:600;" th:text="${product.name}"></td>
                <td>
                    <span class="qty-cell" th:text="${product.quantity}"></span>
                </td>
                <td class="price-cell" th:text="'₹' + ${product.price}"></td>
                <td><span class="badge-cat" th:text="${product.category}"></span></td>
                <td>
                    <a th:href="@{/product/edit/{pid}(pid=${product.id})}" class="action-btn edit-btn">Edit</a>
                    <a th:href="@{/product/delete/{pid}(pid=${product.id})}"
                       onclick="return confirm('Are you sure you want to delete this product?')"
                       class="action-btn delete-btn">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
