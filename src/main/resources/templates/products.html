<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Products | SmartStock</title>
  <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: url('/images/bg.png') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 90%;
      margin: 50px auto;
      background: rgba(255, 255, 255, 0.92);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    }

    h2 {
      color: #2e7d32;
      text-align: center;
      margin-bottom: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .top-bar a {
      text-decoration: none;
      background-color: #4CAF50;
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      transition: 0.3s;
    }

    .top-bar a:hover {
      background-color: #45a049;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table th, table td {
      padding: 12px 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    table th {
      background-color: #4CAF50;
      color: white;
    }

    table tr:hover {
      background-color: #f1f1f1;
    }

    .action-btn {
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px 10px;
      margin: 0 2px;
      cursor: pointer;
    }

    .edit-btn {
      background-color: #2196F3;
    }

    .delete-btn {
      background-color: #f44336;
    }

    .back-btn {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #2e7d32;
      font-weight: bold;
    }

    .back-btn:hover {
      text-decoration: underline;
    }

    .info {
      text-align: center;
      color: #555;
      margin-bottom: 10px;
    }

  </style>
</head>
<body>
<div class="container">

  <h2>Products in Warehouse</h2>

  <p class="info">
    Warehouse: <strong th:text="${warehouse.name}"></strong> |
    Location: <span th:text="${warehouse.location}"></span>
  </p>

  <div class="top-bar">
    <a th:href="@{/product/add/{id}(id=${warehouse.id})}">Add Product</a>
    <a href="/dashboard">Back to Dashboard</a>
  </div>

  <table>
    <thead>
    <tr>
      <th>SKU</th>
      <th>Name</th>
      <th>Quantity</th>
      <th>Price (₹)</th>
      <th>Category</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
      <td th:text="${product.sku}">SKU001</td>
      <td th:text="${product.name}">Example Product</td>
      <td th:text="${product.quantity}">100</td>
      <td th:text="${product.price}">500</td>
      <td th:text="${product.category}">Frozen</td>
      <td>
        <a th:href="@{/product/edit/{pid}(pid=${product.id})}" class="action-btn edit-btn">Edit</a>
        <a th:href="@{/product/delete/{pid}(pid=${product.id})}"
           onclick="return confirm('Are you sure you want to delete this product?')"
           class="action-btn delete-btn">Delete</a>
      </td>
    </tr>
    </tbody>
  </table>

  <a href="/dashboard" class="back-btn">Back</a>

</div>
</body>
</html>
